{% extends 'base.html' %}
{% block title %}{{ offer.title }}{% endblock %}
{% block content %}
<div class="container-wtf page-section" style="max-width:700px;">
    <a href="{% url 'offers' %}"
        style="font-weight:700;font-size:0.9rem;color:#C0392B;display:inline-flex;align-items:center;gap:6px;margin-bottom:1.5rem;">← All Offers
    </a>
    <div class="checkout-card">
        {% if offer.image %}
        <img src="{{ offer.image }}" alt="{{ offer.title }}"
            style="width:100%;border-radius:12px;margin-bottom:1.5rem;max-height:280px;object-fit:cover;" onerror="this.style.display='none'">
        {% endif %}
        <h2 style="font-family:'Playfair Display',serif;font-weight:900;margin-bottom:0.75rem;">{{ offer.title|default:"Special Offer" }}</h2>
        {% if offer.content %}
        <div style="color:#444;line-height:1.8;margin-bottom:1.5rem;">
            {{ offer.content|safe }}
        </div>
        {% endif %}
        <a href="{% url 'menu' %}" class="btn-primary-wtf"
            style="display:block;text-align:center;margin-top:1.5rem;text-decoration:none;">
            Order Now →
        </a>
    </div>
</div>
{% endblock %}
