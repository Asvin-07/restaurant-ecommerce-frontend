{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container-wtf page-section" style="max-width:500px;padding-top:1rem;">
    <a href="{% url 'profile' %}"
        style="font-weight:700;font-size:0.9rem;color:#C0392B;display:inline-flex;align-items:center;gap:6px;margin-bottom:1.5rem;">←
        Back to Profile</a>
    <div class="checkout-card">
        <h4 style="font-family:'Playfair Display',serif;font-weight:900;margin-bottom:1.5rem;">🔒 Change Password</h4>
        <form method="POST" action="{% url 'change_password' %}">
            {% csrf_token %}
            <div style="margin-bottom:1rem;">
                <label class="form-label">Current Password</label>
                <input type="password" name="old_password" class="form-control" placeholder="Enter current password" required>
            </div>
            <div style="margin-bottom:1rem;">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="Min. 4 characters" required
                    minlength="4">
            </div>
            <div style="margin-bottom:1.5rem;">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter new password" required>
            </div>
            <button type="submit" class="btn-primary-wtf">Update Password →</button>
        </form>
    </div>
</div>
{% endblock %}
